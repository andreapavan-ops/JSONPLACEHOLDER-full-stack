<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini JSONPlaceholder</title>
    <link rel="stylesheet" href="stile.css">
</head>
<body>

    <!-- ======================================================
         Header
         ====================================================== -->
    <header>
        <div class="contenitore">
            <h1>Mini JSONPlaceholder</h1>
            <p>Frontend per le nostre API REST</p>
        </div>
    </header>

    <div class="contenitore">

        <!-- ==================================================
             Navigazione
             ================================================== -->
        <nav>
            <button id="nav-utenti" class="attivo">Utenti</button>
            <button id="nav-post">Post</button>
            <button id="nav-commenti">Commenti</button>
            <button id="nav-log">Logout</button>
        </nav>

        <div id="statistiche"></div>

        <!-- ==================================================
             Sezione Utenti
             ================================================== -->
            <section id="sezione-login">
                <h2>Login</h2>
                <form id="form-login">
                    <input type="email" id="login-email" placeholder="Email" required>
                    <input type="password" id="login-password" placeholder="Password" required>
                    <button type="submit">Accedi</button>
                </form>
                <p id="stato-login">Non sei autenticato</p>
            </section>
        
        
             <section id="sezione-utenti">
            <h2>Utenti</h2>

            <form id="form-utente">
            <h3 id="titolo-form-utente">Nuovo Utente</h3>
                <label for="utente-nome">Nome</label>
                <input type="text" id="utente-nome" placeholder="Es. Yoshi Verde" required>
                <label for="utente-email">Email</label>
                <input type="email" id="utente-email" placeholder="Es. yoshi@email.com" required>
                <label for="utente-citta">Citta (opzionale)</label>
                <input type="text" id="utente-citta" placeholder="Es. Isola Yoshi">
                <label for="utente-sesso">Sesso</label>
                <select id="utente-sesso" required>
                    <option value="">-- Seleziona --</option>
                    <option value="M">Maschio</option>
                    <option value="F">Femmina</option>
                    <option value="Altro">Altro</option>
                </select>
                <label for="utente-cf">Codice Fiscale</label>
                <input type="text" id="utente-cf" placeholder="Es. RSSMRA80A01H501A" maxlength="16" required>
                <label for="utente-dataNascita">Data di Nascita (opzionale)</label>
                <input type="date" id="utente-dataNascita">
                <label for="utente-telefono">Telefono (opzionale)</label>
                <input type="text" id="utente-telefono" placeholder="Es. +39 333 1234567">
                <label for="utente-password">Password</label>
                <input type="password" id="utente-password" placeholder="Minimo 8 caratteri" required minlength="8">
                <button type="submit">Salva Utente</button>
                <button type="button" id="annulla-modifica" class="btn-secondario" style="display:none">Annulla</button>
            </form>

            <label for="ricerca-utenti">🔍 Cerca utenti</label>
            <input type="text" id="ricerca-utenti" placeholder="Nome, email o città...">



            <div id="lista-utenti"></div>
        </section>

        <!-- ==================================================
             Sezione Post
             ================================================== -->
        <section id="sezione-post" class="nascosta">
            <div id="breadcrumb-post" class="breadcrumb"></div>
            <h2 id="titolo-post">Post</h2>

            <form id="form-post">
                <h3>Nuovo Post</h3>
                <label for="post-userId">User ID</label>
                <input type="number" id="post-userId" placeholder="Es. 1" required>
                <label for="post-titolo">Titolo</label>
                <input type="text" id="post-titolo" placeholder="Es. Il mio primo post" required>
                <label for="post-corpo">Corpo</label>
                <textarea id="post-corpo" placeholder="Scrivi il contenuto del post..." required></textarea>
                <button type="submit">Crea Post</button>
            </form>

            <div id="lista-post"></div>

            <div id="paginazione-post" style="display:none; text-align:center; margin-top:1rem;">
                <button id="btn-precedente">&#8592; Precedente</button>
                <span id="info-pagina" style="margin:0 1rem;"></span>
                <button id="btn-successiva">Successiva &#8594;</button>
            </div>
        </section>

        <!-- ==================================================
             Sezione Commenti
             ================================================== -->
        <section id="sezione-commenti" class="nascosta">
            <div id="breadcrumb-commenti" class="breadcrumb"></div>
            <h2 id="titolo-commenti">Commenti</h2>

            <form id="form-commento">
                <h3>Nuovo Commento</h3>
                <label for="commento-postId">Post ID</label>
                <input type="number" id="commento-postId" placeholder="Es. 1" required>
                <label for="commento-nome">Nome</label>
                <input type="text" id="commento-nome" placeholder="Es. Mario Rossi" required>
                <label for="commento-email">Email</label>
                <input type="email" id="commento-email" placeholder="Es. mario@email.com" required>
                <label for="commento-corpo">Corpo</label>
                <textarea id="commento-corpo" placeholder="Scrivi il commento..." required></textarea>
                <button type="submit">Crea Commento</button>
            </form>

            <div id="lista-commenti"></div>
        </section>

    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
